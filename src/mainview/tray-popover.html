<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrabControl</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #fff;
      padding: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
    }
    .refresh-btn {
      background: #333;
      border: none;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    .refresh-btn:hover {
      background: #444;
    }
    .agent-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .agent-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: #2a2a2a;
      border-radius: 6px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .status-online { background: #48bb78; }
    .status-offline { background: #f56565; }
    .status-error { background: #ed8936; }
    .status-warning { background: #ecc94b; }
    .agent-name {
      flex: 1;
      font-size: 13px;
    }
    .footer {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid #333;
      display: flex;
      gap: 8px;
    }
    .footer-btn {
      flex: 1;
      background: #333;
      border: none;
      color: #fff;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .footer-btn:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">🦞 CrabControl</span>
    <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
  </div>
  <div class="agent-list" id="agentList">
    <div style="text-align: center; color: #666; padding: 20px;">Loading...</div>
  </div>
  <div class="footer">
    <button class="footer-btn" id="configureBtn">Configure</button>
    <button class="footer-btn" id="quitBtn">Quit</button>
  </div>
  <script>
    const { ipcRenderer } = window.electrobun;
    
    async function loadAgents() {
      try {
        const response = await fetch('views://mainview/agent-config.js');
        // For now just show placeholder - we'll need IPC to get actual data
        document.getElementById('agentList').innerHTML = 
          '<div style="text-align: center; color: #666; padding: 20px;">Agent status will appear here</div>';
      } catch (e) {
        console.error(e);
      }
    }
    
    document.getElementById('refreshBtn').addEventListener('click', () => {
      // Emit event to main process to refresh
      window.electrobun.ipcRenderer.invoke('refresh-status');
    });
    
    document.getElementById('configureBtn').addEventListener('click', () => {
      window.electrobun.ipcRenderer.invoke('open-config');
    });
    
    document.getElementById('quitBtn').addEventListener('click', () => {
      window.electrobun.ipcRenderer.invoke('quit');
    });
    
    loadAgents();
  </script>
</body>
</html>
