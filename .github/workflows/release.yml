name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run ${{ contains(github.ref_name, '-') && 'build:canary' || 'build:stable' }}
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos
          path: artifacts/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run ${{ contains(github.ref_name, '-') && 'build:canary' || 'build:stable' }}
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: artifacts/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run ${{ contains(github.ref_name, '-') && 'build:canary' || 'build:stable' }}
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: artifacts/

  build-daemon-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run daemon:bundle
      - name: Package daemon bundle
        run: |
          mkdir -p artifacts
          tar -czf artifacts/pincerd-${{ github.ref_name }}-linux-x64.tar.gz -C daemon/dist pincerd
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-daemon
          path: artifacts/pincerd-${{ github.ref_name }}-linux-x64.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux, build-daemon-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          normalized_version="${version#v}"

          body=$(awk -v v="$version" -v nv="$normalized_version" '
            BEGIN {
              target1 = "## [" v "]"
              target2 = "## [" nv "]"
              target3 = "## [v" nv "]"
            }
            {
              line = $0
              sub(/^[[:space:]]+/, "", line)
            }
            index(line, target1) == 1 || index(line, target2) == 1 || index(line, target3) == 1 {
              found = 1
              next
            }
            found && line ~ /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$body" ]; then
            echo "Changelog entry not found for $version" >&2
            echo "Expected one of these headings at column 1:" >&2
            echo "  - ## [$version]" >&2
            echo "  - ## [$normalized_version]" >&2
            echo "  - ## [v$normalized_version]" >&2
            echo "Available changelog headings:" >&2
            grep '^## \[' CHANGELOG.md >&2 || true
            exit 1
          fi

          echo "$body" > /tmp/release_notes.md

          prev_version=$(awk -v v="$version" -v nv="$normalized_version" '
            BEGIN {
              target1 = "## [" v "]"
              target2 = "## [" nv "]"
              target3 = "## [v" nv "]"
            }
            {
              line = $0
              sub(/^[[:space:]]+/, "", line)
            }
            index(line, target1) == 1 || index(line, target2) == 1 || index(line, target3) == 1 {
              found = 1
              next
            }
            found && line ~ /^## \[/ {
              sub(/^## \[/, "", line)
              sub(/\].*$/, "", line)
              print line
              exit
            }
          ' CHANGELOG.md)

          if [ -n "$prev_version" ]; then
            echo "" >> /tmp/release_notes.md
            echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${prev_version}...${version}" >> /tmp/release_notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: all-artifacts/*
          body_path: /tmp/release_notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
