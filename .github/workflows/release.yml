name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run ${{ contains(github.ref_name, '-') && 'build:canary' || 'build:stable' }}
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos
          path: artifacts/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run ${{ contains(github.ref_name, '-') && 'build:canary' || 'build:stable' }}
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: artifacts/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run ${{ contains(github.ref_name, '-') && 'build:canary' || 'build:stable' }}
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: artifacts/

  build-daemon-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run daemon:bundle
      - name: Package daemon bundle
        run: |
          mkdir -p artifacts
          tar -czf artifacts/pincerd-${{ github.ref_name }}-linux-x64.tar.gz -C daemon/dist pincerd
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-daemon
          path: artifacts/pincerd-${{ github.ref_name }}-linux-x64.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux, build-daemon-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Validate and load user release notes
        id: notes
        run: |
          version="${{ steps.version.outputs.version }}"
          notes_file="release-notes/${version}.md"

          if [ ! -f "$notes_file" ]; then
            echo "Missing user-facing release notes: $notes_file" >&2
            echo "Create release-notes/${version}.md before tagging a release." >&2
            exit 1
          fi

          cp "$notes_file" /tmp/release_notes.md

          prev_version=$(awk -v v="$version" '
            BEGIN { found=0 }
            {
              line = $0
              sub(/^[[:space:]]+/, "", line)
            }
            found && line ~ /^## \[/ {
              sub(/^## \[/, "", line)
              sub(/\].*$/, "", line)
              print line
              exit
            }
            index(line, "## [" v "]") == 1 { found=1 }
          ' CHANGELOG.md)

          if [ -n "$prev_version" ]; then
            echo "" >> /tmp/release_notes.md
            echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${prev_version}...${version}" >> /tmp/release_notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: all-artifacts/*
          body_path: /tmp/release_notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
