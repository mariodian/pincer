name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build:stable
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos
          path: artifacts/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build:stable
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: artifacts/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build:stable
      - uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: artifacts/

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          body=$(awk -v v="$version" '
            BEGIN { target = "## [" v "]" }
            $0 == target { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$body" ]; then
            echo "Changelog entry not found for $version" >&2
            exit 1
          fi

          echo "$body" > /tmp/release_notes.md

          prev_version=$(awk -v v="$version" '
            BEGIN { target = "## [" v "]" }
            $0 == target { found = 1; next }
            found && /^## \[/ {
              line = $0
              sub(/^## \[/, "", line)
              sub(/\].*$/, "", line)
              print line
              exit
            }
          ' CHANGELOG.md)

          if [ -n "$prev_version" ]; then
            echo "" >> /tmp/release_notes.md
            echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${prev_version}...${version}" >> /tmp/release_notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: all-artifacts/*
          body_path: /tmp/release_notes.md
